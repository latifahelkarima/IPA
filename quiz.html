<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kuis Interaktif</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#14532d">
  
  <link rel="stylesheet" href="assets/css/main.css">
  
  <!-- KaTeX for Math Rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <script src="assets/js/storage.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/quiz.js" defer></script>

  <style>
    .quiz-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background-color: var(--bg-surface);
    }
    
    .quiz-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-subtle);
      background-color: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background-color: var(--border-subtle);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-bar-fill {
      height: 100%;
      background-color: var(--accent-primary);
      transition: width 0.3s ease;
      width: 0%;
    }

    .quiz-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .option-card {
      padding: 16px;
      margin-bottom: 12px;
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      background-color: var(--bg-surface);
    }

    .option-card:active, .option-card.selected {
      border-color: var(--accent-primary);
      background-color: var(--chip-bg);
    }
    
    .option-card.correct {
      border-color: #22c55e;
      background-color: rgba(34, 197, 94, 0.1);
    }
    
    .option-card.wrong {
      border-color: #ef4444;
      background-color: rgba(239, 68, 68, 0.1);
    }

    .quiz-nav {
      padding: 16px 24px;
      background-color: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-subtle);
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      display: flex;
      justify-content: flex-end;
    }
    
    .explanation-box {
      margin-top: 24px;
      padding: 16px;
      border-radius: var(--radius-md);
      background-color: var(--nav-bg);
      border-left: 4px solid var(--accent-secondary);
      display: none;
    }
    
    .explanation-box.show {
      display: block;
      animation: fadeInUp 0.4s ease forwards;
    }
    
    /* Result Screen */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100%;
    }
    
    .result-screen.show {
      display: flex;
      animation: fadeIn 0.5s ease forwards;
    }
    
    .score-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 8px solid var(--accent-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent-primary);
      margin: 24px 0;
    }
  </style>
</head>
<body>

  <div class="quiz-container">
    <div class="quiz-header">
      <div style="flex: 1; margin-right: 16px;">
        <div class="text-caption mb-1" id="quiz-title">Memuat Kuis...</div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="quiz-progress"></div>
        </div>
      </div>
      <a href="index.html" class="btn-icon">
        <span class="material-icons">close</span>
      </a>
    </div>

    <!-- Area Pertanyaan -->
    <div class="quiz-body" id="question-area">
      <div class="date-badge mb-3" id="question-counter">Pertanyaan 1 / ?</div>
      <h2 class="text-h2 mb-4" id="question-text" style="font-size: 1.3rem; line-height: 1.5;">...</h2>
      
      <div id="options-container" style="flex: 1;">
         <!-- Pilihan jawaban di-inject di sini -->
      </div>
      
      <div class="explanation-box" id="explanation-box">
        <h4 class="text-h3 mb-2" style="font-size: 1rem;">Pembahasan:</h4>
        <div class="text-body" id="explanation-text">...</div>
      </div>
    </div>
    
    <!-- Area Hasil (Disembunyikan di awal) -->
    <div class="quiz-body result-screen" id="result-area">
      <span class="material-icons" style="font-size: 4rem; color: var(--accent-secondary);">emoji_events</span>
      <h2 class="text-h1 mt-2">Kuis Selesai!</h2>
      <p class="text-body mt-2">Anda telah menyelesaikan kuis untuk materi ini.</p>
      
      <div class="score-circle" id="final-score">100</div>
      
      <a href="index.html" class="btn btn-primary mt-4" style="width: 100%; text-decoration: none; text-align: center;">
        Kembali ke Beranda
      </a>
    </div>

    <div class="quiz-nav" id="quiz-nav">
      <button class="btn btn-primary" id="btn-submit" style="width: 100%;" disabled>
        Cek Jawaban
      </button>
      <button class="btn btn-primary" id="btn-next" style="width: 100%; display: none;">
        Lanjut <span class="material-icons" style="margin-left: 8px;">arrow_forward</span>
      </button>
    </div>
  </div>

</body>
</html>
